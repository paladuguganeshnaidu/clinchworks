<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Not Found | Clinch Works</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 32px; background: #0b1220; color: #e2e8f0; }
    a { color: #f7c763; }
    .card { max-width: 720px; margin: 0 auto; padding: 24px; border-radius: 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(247,199,99,0.25); }
    .muted { color: rgba(226,232,240,0.8); }
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin: 0 0 8px;">Page not found</h1>
    <p class="muted" style="margin: 0 0 16px;">Redirecting if this is a known route…</p>
    <p class="muted" style="margin: 0;">If you are not redirected, go back to <a href="/">Home</a>.</p>
  </div>

  <script>
    (function () {
      const path = window.location.pathname.replace(/\/+$/, '') || '/';

      // Map clean routes to existing GitHub Pages file locations.
      // This keeps clean links working even when the host only serves static files.
      const map = {
        '/': '/index.html',

        '/services': '/pages/services.html',
        '/ai-development': '/pages/ai-development.html',
        '/web-development': '/pages/web-development.html',
        '/web-hosting': '/pages/web-hosting.html',
        '/growth-optimization': '/pages/growth-optimization.html',

        '/content-marketing': '/pages/content-marketing.html',
        '/google-ads': '/pages/google-ads.html',
        '/social-media-marketing': '/pages/social-media-marketing.html',
        '/video-graphic-design': '/pages/video-graphic-design.html',
        '/website-design': '/pages/website-design.html',
        '/youtube-management': '/pages/youtube-management.html',

        '/training': '/pages/training.html',
        '/domain': '/pages/domain.html',
        '/projects': '/pages/projects.html',
        '/contact': '/pages/contact.html',
        '/book-call': '/pages/book-call.html',

        '/login': '/pages/login.html',
        '/register': '/pages/register.html',
        '/profile': '/pages/profile.html',
        '/dashboard': '/pages/dashboard.html',
        '/admin': '/pages/admin.html',
        '/reception': '/pages/reception.html',

        '/course': '/pages/course.html',
        '/player': '/pages/player.html',
        '/exam': '/pages/exam.html',
        '/certificate': '/certificate.html'
      };

      const target = map[path];
      if (!target) return;

      const nextUrl = target + window.location.search + window.location.hash;
      window.location.replace(nextUrl);
    })();
  </script>
</body>
</html>
