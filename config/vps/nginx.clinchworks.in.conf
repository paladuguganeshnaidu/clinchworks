# Managed by security remediation

server {
    listen 80;
    listen [::]:80;
    server_name clinchworks.in;
    return 301 https://www.clinchworks.in$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.clinchworks.in;
    return 301 https://www.clinchworks.in$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name clinchworks.in;

    ssl_certificate /etc/letsencrypt/live/clinchworks.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clinchworks.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.clinchworks.in$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.clinchworks.in;

    root /var/www/clinchworks;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/clinchworks.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clinchworks.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com https://www.gstatic.com 'sha256-/uH9eaHW33pFZt192hyYREvS0Sa3hEWAOvuOcbtlpME=' 'sha256-1V9OeVOgczaU1mkVyVpychYYRxedP/Wdx5a3dq3vD5s=' 'sha256-C5ry726bOCl5elxCqbrJpI0X/Nhn/sp0Lnyq6MfS4Kg=' 'sha256-ClMJFFMc3cVr188UPQRgEkRvqcWmbbkajP470VoCxQU=' 'sha256-HwV37WUTpx+6yiIJfTO7UJKy0fL2soLvFVjpNHvwcLw=' 'sha256-NAdMEbX60CC06HmZ4+iTx8hPmAIlx62rrQxZplagQhs=' 'sha256-NELZYEq1I23t0m7vC+I6FuyCs+6qdES3rNFdlwowIJY=' 'sha256-Ogei2FOlDBlRG3niHeZ0ZHOouV2JuVAED110T9ECBJg=' 'sha256-RHtye2qmNEs7Pmi+bDlpttnp6LXZzPlWysCQaPeSIVw=' 'sha256-WI9WUbBvx9KDFmINDQolhbAUquSnLOXSiMUNuJ5hJ9A=' 'sha256-Z9e72IcgVPv9DvgcvmKn3/jyYdb/b+0xGcfI09vGO34=' 'sha256-pvnggaYi7vBvwOI8arfVhcg+Oubw8nQx7lQX8HKJY7Q=' 'sha256-tCPdgxOvIa4r8PDzaACletZHhSjwbrcHT8MzFbjIYNI=' 'sha256-uWMk06ltVnAzH5qhmiUm9ucEclypCLeFwCOGI2OJuOU='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com;" always;

    error_page 404 /404.html;
    location = /404.html {
        try_files /pages/404.html /404.html =404;
    }

    # Block all hidden files/directories except .well-known (for Let's Encrypt)
    location ~ /\.(?!well-known)(.*)$ { return 404; }

    # Block functions and data directories explicitly
    location ~* ^/functions(?:/|$) { return 404; }
    location ~* ^/\.data(?:/|$) { return 404; }

    # Block explicitly sensitive files
    location ~* ^/(?:dev-server\.js|examquestions\.json|firebase\.json|firestore\.indexes\.json|firestore\.rules)$ { return 404; }

    # Canonical root and index handling
    location = / { try_files /index.html =404; }
    location = /index { return 301 /; }
    location = /index.html { return 301 /; }
    location ~ ^/pages/([A-Za-z0-9-]+)(?:\.html)?/?$ { return 301 /$1; }
    location ~ ^/(?!index\.html$)([A-Za-z0-9-]+)\.html$ { return 301 /$1; }

    # API routes should never hit static fallback
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        try_files $uri $uri/ @clean_pages;
    }

    location @clean_pages {
        try_files /pages$uri.html $uri.html =404;
    }
}
