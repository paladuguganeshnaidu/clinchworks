<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services — Clinch Works</title>
  <meta name="description"
    content="Clinch Works is a software engineering company specializing in developmentv, cloud, and AI. We solve and deliver real systems." />
  <meta name="keywords" content="software engineering, web development , cloud, AI, system design, automation" />
  <meta name="author" content="Clinch Works" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  

  <link rel="stylesheet" href="../assets/css/styles.css" />
  
  
  
  
  
  
  
  
  
  
  
<style>
  /* Force professional, smooth rendering for logos similar to premium SaaS products */
  img[src*='logo.png'], img[src*='favicon'] {
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges; /* fallback */
    image-rendering: auto;
    object-fit: contain;
    shape-rendering: geometricPrecision;
  }
</style>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon1.png?v=2">
  <link rel="shortcut icon" href="../assets/favicon/favicon1.png?v=2">
  <link rel="apple-touch-icon" href="../assets/favicon/favicon1.png?v=2">
</head>

<body>

  <!-- ========================================
       HEADER — Fixed top navigation
  ======================================== -->
  <header id="header" class="fixed top-0 left-0 right-0 z-50"></header>

    
    <a href="training.html" data-section="training">Training</a>
    <a href="projects.html" data-section="projects">Projects</a>
    <a href="contact.html" class="sm:hidden" style="color: var(--accent); margin-top: 1rem;">Contact
      →</a>
  </div>

  <div class="pt-24 min-h-screen">

    <section class="relative pb-16 pt-6 sm:pb-24 sm:pt-8 lg:pb-32 lg:pt-10">
      <div class="max-w-3xl mx-auto px-5 sm:px-6">
        
        <div class="section-reveal visible text-center">
          <div class="accent-line mb-4 mx-auto"></div>
          <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold tracking-tight" style="color: var(--text-primary);">
            Start Your Project
          </h1>
          <p class="mt-4 sm:mt-6 text-base sm:text-lg leading-relaxed" style="color: var(--text-faint);">
            Fill out the form below and our engineering team will reach out to discuss your specific operational and structural needs.
          </p>
        </div>

        <div class="mt-12 sm:mt-16 section-reveal visible">
            <!-- Utilizing the service-card style to house the form seamlessly -->
            <form action="#" method="POST" class="service-card rounded-2xl p-8 sm:p-10 flex flex-col gap-6" onsubmit="event.preventDefault(); alert('Thank you for reaching out! We will contact you soon.');">
                
                <div class="flex flex-col gap-2">
                    <label for="name" class="text-sm font-medium" style="color: var(--text-primary);">Full Name / Company Name</label>
                    <input type="text" id="name" required class="w-full rounded-lg px-4 py-3 text-sm transition-all focus:outline-none" style="background: var(--bg-primary); border: 1px solid var(--contact-border); color: var(--text-primary); box-shadow: inset 0 2px 4px var(--glass-shadow);" placeholder="Jane Doe">
                </div>

                <div class="flex flex-col gap-2">
                    <label for="email" class="text-sm font-medium" style="color: var(--text-primary);">Email Address</label>
                    <input type="email" id="email" required class="w-full rounded-lg px-4 py-3 text-sm transition-all focus:outline-none" style="background: var(--bg-primary); border: 1px solid var(--contact-border); color: var(--text-primary); box-shadow: inset 0 2px 4px var(--glass-shadow);" placeholder="jane@example.com">
                </div>

                <div class="flex flex-col gap-2">
                    <label for="service" class="text-sm font-medium" style="color: var(--text-primary);">Service Interested In</label>
                    <select id="service" class="w-full rounded-lg px-4 py-3 text-sm transition-all focus:outline-none cursor-pointer" style="background: var(--bg-primary); border: 1px solid var(--contact-border); color: var(--text-primary); box-shadow: inset 0 2px 4px var(--glass-shadow);">
                        <option value="none">General Inquiry</option>
                        <option value="google-ads">Google Ads</option>
                        <option value="smm">Social Media Marketing</option>
                        <option value="web-design">Website Design</option>
                        <option value="content">Content Marketing</option>
                        <option value="youtube">YouTube Management</option>
                        <option value="video">Video & Graphic Design</option>
                        <option value="dev">Software / Web Development</option>
                        <option value="cloud">Cloud / DevOps</option>
                        <option value="training">Training Programs</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label for="details" class="text-sm font-medium" style="color: var(--text-primary);">Project Details</label>
                    <textarea id="details" required rows="5" class="w-full rounded-lg px-4 py-3 text-sm transition-all focus:outline-none resize-none" style="background: var(--bg-primary); border: 1px solid var(--contact-border); color: var(--text-primary); box-shadow: inset 0 2px 4px var(--glass-shadow);" placeholder="Tell us about your goals, current bottlenecks, and timelines..."></textarea>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn-contact w-full border text-sm px-8 py-4 rounded-lg font-bold transition-all text-center tracking-wide" style="background: var(--accent); color: var(--bg-primary); border-color: transparent;">
                        Submit Request
                    </button>
                </div>
            </form>
        </div>

      </div>
    </section>

  </div>

  <footer class="py-8 sm:py-12" style="border-top: 1px solid var(--footer-border);"></footer>


  <!-- ========================================
       JAVASCRIPT
  ======================================== -->
  

</body>

</html>
