<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Player | Clinch Works</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    /* Scope-specific Player Overrides */
    body { background: #fdfdfd; overflow: hidden; height: 100vh; width: 100vw; }
    #player-layout { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 65px); margin-top: 65px; background: white; }
    .player-sidebar { border-right: 1px solid #e2e8f0; background: #f8fafc; overflow-y: auto; display: flex; flex-direction: column; }
    .player-main { overflow-y: auto; padding: 0; background: white; position: relative; }
    .content-card { max-width: 900px; margin: 40px auto; padding: 40px; border-radius: 24px; background: white; }
    .sidebar-active { background: #fffbeb !important; border-left: 4px solid #F7C763 !important; color: #0b1220 !important; font-weight: 700 !important; }
    
    /* Code block fixes */
    pre code { font-family: 'JetBrains Mono', monospace !important; font-size: 0.9rem !important; line-height: 1.6 !important; }
    .clinch-code-block { margin: 2rem 0; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
    
    @media (max-width: 1024px) {
      #player-layout { grid-template-columns: 1fr; }
      .player-sidebar { display: none; }
    }
  </style>
</head>
<body>
  <!-- Header remains consistent with main site -->
  <header id="header" class="header fixed top-0 left-0 w-full z-[1000] transition-all duration-300 scrolled" style="background: white; border-bottom: 1px solid #e2e8f0;">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="../assets/img/logo.png" alt="Logo" class="w-8 h-8 object-contain">
        <span class="font-black text-xl tracking-tighter text-slate-900">CLINCH <span class="-[#F7C763]">WORKS.</span></span>
      </div>
      <div class="flex items-center gap-6">
         <div id="breadcrumb" class="hidden md:flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-slate-400">
           LIBRARY <span class="opacity-30">/</span> TRAINING <span class="opacity-30">/</span> COURSE
         </div>
         <a href="training.html" class="text-xs font-bold text-slate-900 hover:-[#F7C763] transition-colors uppercase tracking-widest">Exit Player</a>
      </div>
    </div>
  </header>

  <div id="player-layout">
    <!-- Sidebar Navigation -->
    <aside class="player-sidebar">
      <div class="p-6 border-bottom border-slate-200">
        <h2 id="sidebar-course-title" class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Course Index</h2>
      </div>
      <div id="sidebar-modules" class="flex-1">
        <!-- Dynamic module items -->
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="player-main">
      <div class="sticky top-0 bg-white/80 backdrop-blur-md z-30 border-b border-slate-100">
        <div class="max-w-4xl mx-auto px-10 py-5 flex items-center justify-between">
          <div class="flex-1">
            <div class="flex items-center gap-4 mb-1">
               <span id="progress-percent" class="text-[10px] font-black uppercase tracking-widest -[#F7C763]">Progress: 0%</span>
               <div class="flex-1 bg-slate-100 h-1.5 rounded-full overflow-hidden max-w-[200px]">
                 <div id="progress-bar" class="h-full -[#F7C763] transition-all duration-500" style="width: 0%"></div>
               </div>
            </div>
            <p id="progress" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Module 0 of 0</p>
          </div>
          <div class="flex items-center gap-3">
            <button id="btn-prev" class="p-2.5 rounded-xl border border-slate-200 text-slate-400 hover:text-slate-900 hover:border-slate-900 transition-all disabled:opacity-30">
               <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <button id="btn-next" class="px-6 py-2.5 bg-slate-900 -[#F7C763] font-bold text-xs uppercase tracking-widest rounded-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-2">
               Continue <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="content-card">
        <h1 id="module-title" class="text-4xl sm:text-5xl font-black text-slate-900 leading-tight mb-8 tracking-tighter">Synchronizing course data...</h1>
        <div id="module-meta" class="flex items-center gap-4 mb-12">
           <!-- Dynamic Meta Tags -->
        </div>
        <div id="module-content" class="text-lg text-slate-700 leading-relaxed space-y-6">
           <div class="py-24 flex flex-col items-center justify-center opacity-20">
              <div class="w-12 h-12 border-4 border-slate-200 -[#F7C763] rounded-full animate-spin mb-6"></div>
              <p class="font-mono text-xs uppercase tracking-[0.3em]">Accessing Cryptography Node</p>
           </div>
        </div>
      </div>
      
      <footer class="max-w-4xl mx-auto px-10 py-20 border-t border-slate-100 mt-20">
         <div class="flex flex-col md:flex-row justify-between items-center gap-6">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Professional Training System &copy; 2026 Clinchworks</p>
            <div class="flex gap-8">
               <a href="#" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 uppercase tracking-widest transition-colors">Documentation</a>
               <a href="#" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 uppercase tracking-widest transition-colors">Support</a>
            </div>
         </div>
      </footer>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const courseId = params.get('id');
      let currentModuleIndex = 0;
      let courseData = null;
      let studentName = '';

      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');
      const modTitle = document.getElementById('module-title');
      const modContent = document.getElementById('module-content');
      const progress = document.getElementById('progress');
      const progPercent = document.getElementById('progress-percent');
      const progBar = document.getElementById('progress-bar');
      const sidebarContent = document.getElementById('sidebar-modules');

      studentName = localStorage.getItem('clinch-student-name') || 'ClinchWorks Scholar';

      async function init() {
        try {
          const response = await fetch('../courses-content.json');
          const data = await response.json();
          courseData = data.courses.find(c => c.id === courseId);
          
          if (!courseData) {
            modTitle.textContent = "Registry Error";
            modContent.innerHTML = "Course not found.";
            return;
          }

          document.title = `${courseData.title} | Clinch Works`;
          const savedIndex = localStorage.getItem('course-' + courseId);
          if (savedIndex) currentModuleIndex = parseInt(savedIndex) || 0;

          renderSidebar();
          renderModule();

        } catch (error) {
          console.error(error);
          modTitle.textContent = "Connection Failure";
        }
      }

      function renderSidebar() {
        if (!sidebarContent || !courseData) return;
        sidebarContent.innerHTML = '';
        courseData.modules.forEach((mod, idx) => {
          const item = document.createElement('div');
          item.className = `p-5 pl-8 cursor-pointer transition-all border-l-4 border-transparent hover:bg-slate-100 flex items-center gap-4 ${idx === currentModuleIndex ? 'sidebar-active' : 'text-slate-500'}`;
          item.innerHTML = `<span class="text-[10px] font-black opacity-30">${idx + 1}</span><span class="text-[11px] font-bold uppercase tracking-tight truncate">${mod.title}</span>`;
          item.onclick = () => { currentModuleIndex = idx; renderModule(); sidebarContent.scrollIntoView(); };
          sidebarContent.appendChild(item);
        });
        document.getElementById('sidebar-course-title').textContent = courseData.title;
      }

      function renderModule() {
        if (!courseData || !courseData.modules[currentModuleIndex]) return;
        const module = courseData.modules[currentModuleIndex];
        const isLast = currentModuleIndex === courseData.modules.length - 1;
        
        localStorage.setItem('course-' + courseId, currentModuleIndex);
        
        modTitle.textContent = module.title;
        renderContent(module.content);
        
        // Update UI
        let pct = Math.round((currentModuleIndex / (courseData.modules.length - 1)) * 100) || 0;
        progPercent.textContent = `Progress: ${pct}%`;
        progBar.style.width = `${pct}%`;
        progress.textContent = `Module ${currentModuleIndex + 1} of ${courseData.modules.length}`;
        
        // Metadata
        const meta = document.getElementById('module-meta');
        meta.innerHTML = `<span class="px-3 py-1 -[#F7C763] -[#F7C763] text-[9px] font-black uppercase rounded-full">${courseData.category}</span>
                          <span class="px-3 py-1 bg-slate-100 text-slate-500 text-[9px] font-black uppercase rounded-full">${courseData.duration}</span>`;

        // Nav
        btnPrev.disabled = currentModuleIndex === 0;
        btnNext.innerHTML = isLast ? 'Take Final Assessment' : 'Continue <span>&rarr;</span>';
        btnNext.onclick = isLast ? () => window.location.href = `exam.html?id=${courseId}` : () => { currentModuleIndex++; renderModule(); };
        btnPrev.onclick = () => { currentModuleIndex--; renderModule(); };

        // Sidebar update
        Array.from(sidebarContent.children).forEach((el, i) => {
          el.className = `p-5 pl-8 cursor-pointer transition-all border-l-4 border-transparent hover:bg-slate-100 flex items-center gap-4 ${i === currentModuleIndex ? 'sidebar-active' : 'text-slate-500'}`;
        });

        if (window.initCodeBlocks) initCodeBlocks();
        document.querySelector('.player-main').scrollTo({ top: 0, behavior: 'smooth' });
      }

      function renderContent(content) {
        modContent.innerHTML = '';
        const lines = Array.isArray(content) ? content : [content];
        lines.forEach(line => {
          if (!line.trim()) return;
          if (line.startsWith('<')) {
            const d = document.createElement('div');
            d.innerHTML = line;
            modContent.appendChild(d);
          } else {
            const p = document.createElement('p');
            p.className = "mb-6 leading-relaxed text-slate-700";
            p.textContent = line;
            modContent.appendChild(p);
          }
        });
        
        // Handle code blocks
        modContent.querySelectorAll('pre code').forEach(block => {
           hljs.highlightElement(block);
           const p = block.parentElement;
           p.className = "p-6 bg-slate-900 rounded-xl my-8 overflow-x-auto selection:-[#F7C763] selection:text-slate-900";
        });
      }

      init();
    })();
  </script>
</body>
</html>
