<!DOCTYPE html>
<!--
Page: Course Player
Purpose: Delivers module content, progress updates, and exam transition.
Linked from: Course page and dashboard learning actions.
-->
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow" />
  <title>Course Player | Clinch Works</title>
  <link rel="stylesheet" href="/assets/css/styles.css?v=177659729621367">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/assets/js/tailwind-config.js"></script>
  <style>
    /* Scope-specific Player Overrides */
    :root {
      --player-header-height: 64px;
      --player-sidebar-width: 308px;
    }

    body {
      background: radial-gradient(circle at 15% -8%, rgba(245, 183, 0, 0.14), transparent 35%),
        radial-gradient(circle at 88% 8%, rgba(143, 106, 16, 0.12), transparent 30%),
        var(--bg-root);
      overflow: hidden;
      min-height: 100dvh;
      color: var(--text-primary);
    }

    #player-layout {
      display: grid;
      grid-template-columns: var(--player-sidebar-width) minmax(0, 1fr);
      height: 100dvh;
      margin-top: 0;
      background: transparent;
    }

    .player-sidebar {
      border-right: 1px solid var(--border-color);
      background: linear-gradient(180deg, rgba(24, 13, 32, 0.98) 0%, rgba(14, 8, 18, 0.98) 100%);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      contain: content;
      animation: player-fade-in 0.38s ease-out;
    }

    .player-main {
      overflow-y: auto;
      padding: 0;
      background: linear-gradient(180deg, rgba(21, 12, 28, 0.85) 0%, rgba(10, 6, 14, 1) 100%);
      position: relative;
      contain: layout style paint;
    }

    .player-toolbar {
      border-bottom: 1px solid var(--border-color);
      background: rgba(20, 10, 26, 0.84);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .content-card {
      max-width: 880px;
      /* Fix: set margin-top to 0 to remove large blank space */
      margin: 0 auto 60px;
      padding: clamp(24px, 5vw, 48px);
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(10px);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.4);
      animation: player-fade-in 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .sidebar-active {
      background: rgba(255, 193, 7, 0.18) !important;
      border-left: 4px solid var(--accent-soft) !important;
      color: var(--text-primary) !important;
      font-weight: 700 !important;
    }

    .sidebar-module-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px 14px 22px;
      border-left: 4px solid transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .sidebar-module-item:hover {
      background: rgba(255, 193, 7, 0.12);
      color: var(--text-primary);
      transform: translateX(2px);
    }

    .sidebar-module-item.sidebar-locked {
      opacity: 0.46;
      cursor: not-allowed;
      transform: none !important;
    }

    .sidebar-module-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 7px;
      font-size: 10px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-faint);
      flex-shrink: 0;
    }

    .sidebar-module-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      line-height: 1.4;
      white-space: normal;
      overflow-wrap: break-word;
      min-width: 0;
    }

    .sidebar-header {
      padding: 24px 24px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .sidebar-course-title {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent-soft);
      margin-bottom: 2px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Code block and Typography fixes */
    #module-content {
      font-size: 17px;
      line-height: 1.8;
      color: var(--text-secondary);
    }

    #module-content h2 {
      font-size: 24px;
      font-weight: 800;
      color: white;
      margin-top: 2.5rem;
      margin-bottom: 1rem;
    }

    #module-content h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-soft);
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }

    #module-content p {
      margin-bottom: 1.5rem;
    }

    #module-content ul,
    #module-content ol {
      margin-bottom: 1.5rem;
      padding-left: 1.5rem;
    }

    #module-content li {
      margin-bottom: 0.5rem;
    }

    pre code {
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 0.88rem !important;
      line-height: 1.7 !important;
      padding: 1.5rem !important;
      border-radius: 12px;
    }

    .clinch-code-block {
      margin: 2rem 0;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    @keyframes player-fade-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1024px) {
      #player-layout {
        grid-template-columns: 1fr;
      }

      .player-sidebar {
        display: none;
      }

      .content-card {
        margin: 20px 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      .player-sidebar,
      .content-card,
      .sidebar-module-item {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>

  <!-- Favicon Configuration -->
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/logo-transparent.png?v=1">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/logo-transparent.png?v=1">
  <link rel="shortcut icon" href="/assets/images/logo-transparent.png?v=1">
  <link rel="apple-touch-icon" href="/assets/images/logo-transparent.png?v=1">

</head>

<body>
  <!-- Master Header -->
  <header id="header" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
    <div class="w-full px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between relative">

      <!-- LOGO (Left Aligned) -->
      <a href="/" class="flex items-center gap-0 group z-10">
        <div
          class="flex-shrink-0 flex items-center justify-center transition-transform duration-300 group-hover:scale-105">
          <img src="/assets/images/logo.png?v=3" alt="Clinch Works Logo"
            class="h-6 sm:h-8 w-auto object-contain rounded-[9px] border border-slate-200/50 shadow-sm"
            style="overflow: hidden;" />
        </div>
        <span class="font-semibold text-sm sm:text-[20px] tracking-wide ml-2" style="color: #c9a84c;">Clinch
          Works</span>
      </a>


      <!-- RIGHT ACTIONS (Right Aligned) -->
      <div class="flex items-center justify-end gap-3 z-10">
        <button id="theme-toggle" class="theme-toggle flex items-center justify-center" aria-label="Toggle theme">
          <svg class="icon-moon" fill="currentColor" viewBox="0 0 24 24" style="width: 20px; height: 20px;">
            <path
              d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
          </svg>
        </button>

        <!-- User Menu Trigger -->
        <a id="nav-auth-btn" href="/login" class="nav-user-trigger sm:flex" aria-label="User menu">
          <span class="nav-user-avatar-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21a8 8 0 0 0-16 0"></path>
              <circle cx="12" cy="8" r="4"></circle>
            </svg>
          </span>
          <span class="nav-user-avatar-text hidden" aria-hidden="true">U</span>
        </a>

        <a href="/book-call"
          class="hidden sm:flex items-center justify-center text-xs sm:text-sm font-bold shadow-lg transition-transform hover:scale-105"
          style="background: #F7C763; color: #0b1220; border-radius: 999px; padding: 8px 20px;">Book a Call</a>
        <button id="hamburger" class="hamburger lg:hidden ml-2"
          aria-label="Open menu"><span></span><span></span><span></span></button>
      </div>

    </div>
  </header>

  <div id="mobile-menu" class="mobile-menu lg:hidden">
    <!-- Fix: removed empty clearing div -->
    <a href="/#about" data-section="about">About</a>
    <a href="/services" data-section="services">Services</a>
    <a href="/domain" data-section="training">Training</a>

    <a href="/projects" data-section="projects">Projects</a>
    <a href="/book-call" style="color: #F1AF2C; margin-top: 1rem;">Contact &rarr;</a>
  </div>


  <div id="player-layout">
    <!-- Sidebar Navigation -->
    <aside class="player-sidebar">
      <div class="flex-shrink-0" style="height: var(--player-header-height);"></div>
      <div class="sidebar-header border-b border-white/5">
        <h2 id="sidebar-course-title" class="sidebar-course-title">Course Index</h2>
      </div>
      <div id="sidebar-modules" class="flex-1">
        <!-- Dynamic module items -->
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="player-main">
      <div class="flex-shrink-0" style="height: var(--player-header-height);"></div>
      <div class="player-toolbar sticky z-30 border-b border-white/5 bg-[#0b0b0f]/80 backdrop-blur-md" style="top: var(--player-header-height);">
        <div class="max-w-5xl mx-auto px-6 sm:px-10 py-4 flex items-center justify-between gap-6">
          <div class="flex-1">
            <div class="flex items-center gap-4 mb-1">
              <span id="progress-percent" class="text-[10px] font-black uppercase tracking-widest">Progress:
                0%</span>
              <div class="flex-1 bg-black/20 h-1.5 rounded-full overflow-hidden max-w-[200px]">
                <div id="progress-bar" class="h-full transition-all duration-500" style="width: 0%"></div>
              </div>
            </div>
            <p id="progress" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Module 0 of 0</p>
          </div>
          <div class="flex items-center gap-4 sm:gap-6">
            <button id="btn-prev"
              class="flex-shrink-0 p-2.5 rounded-xl border border-white/20 text-slate-300 hover:text-white hover:border-[#ffd54f] transition-all disabled:opacity-30">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
              </svg>
            </button>
            <button id="btn-next"
              class="flex-shrink-0 px-6 py-2.5 font-bold text-xs uppercase tracking-widest rounded-xl hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-2"
              style="background: var(--gradient-brand); color: #ffffff; box-shadow: 0 8px 20px rgba(255, 193, 7, 0.2);">
              Continue <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="content-card">
        <h1 id="module-title"
          class="text-3xl sm:text-4xl lg:text-5xl font-extrabold leading-tight mb-4 tracking-tight text-white">
          Synchronizing...
        </h1>
        <div id="module-meta" class="flex flex-wrap items-center gap-3 mb-10 opacity-70">
          <!-- Dynamic Meta Tags -->
        </div>
        <div id="module-content" class="text-lg leading-relaxed space-y-6" style="color: var(--text-secondary);">
          <!-- Fix: removed leftover loader placeholder -->
        </div>
      </div>

      <div id="site-footer"></div>
    </main>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script type="module" src="/assets/js/api-fetch-patch.js"></script>
  <script src="/assets/js/player-init.js"></script>
  <!-- ========================================
       JAVASCRIPT
  ======================================== -->
  <script src="/assets/js/script.js"></script>
  <script src="/assets/js/footer-loader.js"></script>
</body>

</html>
