<!DOCTYPE html>
<html lang="en" class="scroll-smooth overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow" />
    <title>Profile | ClinchWorks</title>
    <link rel="stylesheet" href="/assets/css/tailwind-compiled.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css?v=177659729621367" />

  <!-- Favicon Configuration -->
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/logo-transparent.png?v=1">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/logo-transparent.png?v=1">
  <link rel="shortcut icon" href="/assets/images/logo-transparent.png?v=1">
  <link rel="apple-touch-icon" href="/assets/images/logo-transparent.png?v=1">

</head>
<body class="overflow-x-hidden w-full relative bg-[#0b1220] auth-cloak">

    <header id="header" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between relative">
            <a href="/" class="flex items-center gap-0 group z-10 w-1/4">
                <div class="flex-shrink-0 flex items-center justify-center transition-transform duration-300 group-hover:scale-105">
                    <img src="/assets/images/logo.png?v=3" alt="Clinch Works Logo" class="h-6 sm:h-8 w-auto object-contain rounded-[10px] border border-slate-200/50 shadow-sm" style="overflow: hidden;" />
                </div>
                <span class="font-semibold text-sm sm:text-[20px] tracking-wide ml-2" style="color: #c9a84c;">Clinch Works</span>
            </a>

            <nav id="top-nav" class="top-nav glass-strong rounded-full px-5 py-2.5 hidden lg:flex items-center justify-center absolute left-1/2 transform -translate-x-1/2 min-w-[500px] shadow-sm z-50" style="background: #228B22; border: 1px solid rgba(34, 139, 34, 0.9);">
                <ul class="flex items-center gap-3 sm:gap-6 w-full justify-center m-0 p-0">
                    <li class="nav-item-wrapper"><a href="/" class="top-nav-item block px-3 py-1 text-sm font-medium rounded-xl transition-colors" data-section="about">About</a></li>
                    <li class="nav-item-wrapper"><a href="/services" class="top-nav-item block px-3 py-1 text-sm font-medium rounded-xl transition-colors" data-section="services">Services</a></li>
                    <li class="nav-item-wrapper"><a href="/domain" class="top-nav-item block px-3 py-1 text-sm font-medium rounded-xl transition-colors" data-section="training">Training</a></li>
                    <li class="nav-item-wrapper"><a href="/projects" class="top-nav-item block px-3 py-1 text-sm font-medium rounded-xl transition-colors" data-section="projects">Projects</a></li>
                </ul>
            </nav>

            <div class="flex items-center justify-end gap-3 z-10 w-1/4">
                <a id="nav-auth-btn" href="/login" class="nav-user-trigger hidden sm:flex" aria-label="User menu">
                    <span class="nav-user-avatar-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21a8 8 0 0 0-16 0"></path>
                            <circle cx="12" cy="8" r="4"></circle>
                        </svg>
                    </span>
                    <span class="nav-user-avatar-text hidden" aria-hidden="true">U</span>
                </a>
                <a href="/book-call" class="hidden sm:flex items-center justify-center text-xs sm:text-sm font-bold shadow-lg transition-transform hover:scale-105" style="background: #F7C763; color: #0b1220; border-radius: 999px; padding: 8px 20px;">Book a Call</a>
            </div>
        </div>
    </header>

    <section class="relative min-h-screen flex items-center justify-center py-24 overflow-hidden">
        <div class="absolute inset-0 hero-bg"></div>
        <div class="hero-grid"></div>

        <div class="w-full max-w-4xl mx-auto px-5 sm:px-6 relative z-10 section-reveal opacity-0 translate-y-10">
            <div class="service-card rounded-[24px] p-8 sm:p-10 flex flex-col relative overflow-hidden group w-full shadow-2xl bg-[#F1AF2C]">
                <div class="absolute inset-0 bg-gradient-to-tl from-[#c9a84c] to-[#F1AF2C] opacity-100 pointer-events-none z-0"></div>

                <div class="relative z-10 w-full flex flex-col">
                    <p class="text-xs font-bold tracking-widest uppercase mb-2 text-black text-center">Account Profile</p>
                    <h3 class="text-3xl sm:text-4xl font-black mb-8 text-black text-center">Complete Your Profile</h3>
                    
                    <div id="auth-msg" class="mb-6 text-sm font-bold text-center hidden min-h-[20px] bg-red-100/50 p-3 rounded-lg border border-red-500 text-red-900 shadow"></div>

                    <!-- Profile Photo Placeholder -->
                    <div class="w-full flex justify-center mb-8">
                        <div class="w-24 h-24 rounded-full bg-[#0b1220] border-4 border-white flex items-center justify-center text-white font-bold text-2xl shadow-lg relative overflow-hidden">
                            <span id="profile-initials">CW</span>
                        </div>
                    </div>

                    <form id="profile-form" class="w-full grid grid-cols-1 md:grid-cols-2 gap-4">
                        
                        <!-- BASIC INFO -->
                        <div class="col-span-1 md:col-span-2 text-lg font-bold text-black border-b border-black/20 pb-2 mb-2 mt-4 uppercase">Basic Information</div>
                        
                        <div class="flex flex-col gap-1">
                            <label class="text-xs font-bold uppercase text-black">First Name <span class="text-red-700">*</span></label>
                            <input type="text" id="profile-firstname" class="w-full px-4 py-3 rounded-xl bg-white text-black font-medium shadow-inner outline-none focus:ring-2 focus:ring-black" required />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-xs font-bold uppercase text-black">Last Name <span class="text-red-700">*</span></label>
                            <input type="text" id="profile-lastname" class="w-full px-4 py-3 rounded-xl bg-white text-black font-medium shadow-inner outline-none focus:ring-2 focus:ring-black" required />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-xs font-bold uppercase text-black">Email (Read-Only)</label>
                            <input type="email" id="profile-email" class="w-full px-4 py-3 rounded-xl bg-gray-200 text-gray-700 font-medium shadow-inner outline-none cursor-not-allowed" disabled />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-xs font-bold uppercase text-black">Phone Number <span class="text-red-700">*</span></label>
                            <input type="tel" id="profile-phone" class="w-full px-4 py-3 rounded-xl bg-white text-black font-medium shadow-inner outline-none focus:ring-2 focus:ring-black" required />
                        </div>

                        <!-- EXTENDED INFO -->
                        <div class="col-span-1 md:col-span-2 text-lg font-bold text-black border-b border-black/20 pb-2 mb-2 mt-6 uppercase">Extended Profile</div>

                        <div class="flex flex-col gap-1">
                            <label class="text-xs font-bold uppercase text-black">Date of Birth <span class="text-red-700">*</span></label>
                            <input type="date" id="profile-dob" class="w-full px-4 py-3 rounded-xl bg-white text-black font-medium shadow-inner outline-none focus:ring-2 focus:ring-black" required />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-xs font-bold uppercase text-black">Gender <span class="text-red-700">*</span></label>
                            <select id="profile-gender" class="w-full px-4 py-3 rounded-xl bg-white text-black font-medium shadow-inner outline-none focus:ring-2 focus:ring-black" required>
                                <option value="" disabled selected>Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="other">Other</option>
                                <option value="prefer_not_to_say">Prefer not to say</option>
                            </select>
                        </div>
                        <div class="flex flex-col gap-1 col-span-1 md:col-span-2">
                            <label class="text-xs font-bold uppercase text-black">Address <span class="text-red-700">*</span></label>
                            <input type="text" id="profile-address" class="w-full px-4 py-3 rounded-xl bg-white text-black font-medium shadow-inner outline-none focus:ring-2 focus:ring-black" required />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-xs font-bold uppercase text-black">City <span class="text-red-700">*</span></label>
                            <input type="text" id="profile-city" class="w-full px-4 py-3 rounded-xl bg-white text-black font-medium shadow-inner outline-none focus:ring-2 focus:ring-black" required />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-xs font-bold uppercase text-black">Country <span class="text-red-700">*</span></label>
                            <input type="text" id="profile-country" class="w-full px-4 py-3 rounded-xl bg-white text-black font-medium shadow-inner outline-none focus:ring-2 focus:ring-black" required />
                        </div>

                        <!-- ACCOUNT INFO (READ ONLY) -->
                        <div class="col-span-1 md:col-span-2 text-sm font-mono text-black/60 bg-black/5 p-4 rounded-xl mt-6 flex flex-wrap gap-x-8 gap-y-2 uppercase tracking-wide">
                            <span>Provider: <b id="info-provider" class="text-black">...</b></span>
                            <span>Created: <b id="info-created" class="text-black">...</b></span>
                            <span>Last Login: <b id="info-lastlogin" class="text-black">...</b></span>
                        </div>
                        
                        <div class="col-span-1 md:col-span-2 mt-6 flex flex-col sm:flex-row gap-4 justify-end">
                            <button type="button" id="change-password" class="px-6 py-3.5 rounded-full text-sm font-black uppercase tracking-widest transition-all hover:scale-105 shadow hover:shadow-xl bg-white text-black w-full sm:w-auto">
                                Change Password
                            </button>
                            <button type="submit" id="btn-profile" class="px-10 py-3.5 rounded-full text-sm font-black uppercase tracking-widest transition-all hover:scale-105 shadow-xl bg-[#0b1220] text-[#primary-gold] text-white w-full sm:w-auto">
                                Save Profile
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>
    <script type="module" src="/assets/js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof gsap !== 'undefined') {
                gsap.to(".section-reveal", {
                    opacity: 1, y: 0, duration: 0.8, ease: "power3.out", delay: 0.1
                });
            }
        });
    </script>
</body>
</html>
