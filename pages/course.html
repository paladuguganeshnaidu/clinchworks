<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Details — Clinch Works</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  

  <link rel="stylesheet" href="../assets/css/styles.css" />
  
  
  
  
  
  
  
  
  
  
  
<style>
  /* Force professional, smooth rendering for logos similar to premium SaaS products */
  img[src*='logo.png'], img[src*='favicon'] {
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges; /* fallback */
    image-rendering: auto;
    object-fit: contain;
    shape-rendering: geometricPrecision;
  }
</style>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon1.png?v=2">
  <link rel="shortcut icon" href="../assets/favicon/favicon1.png?v=2">
  <link rel="apple-touch-icon" href="../assets/favicon/favicon1.png?v=2">
</head>

<body>

  <header id="header" class="fixed top-0 left-0 right-0 z-50"></header>

  
    <a href="projects.html" data-section="projects">Projects</a>
  </div>

  <div class="pt-24 min-h-screen">
    <section class="relative pb-16 pt-6 sm:pb-24 sm:pt-8 lg:pb-32 lg:pt-10">
      <div class="max-w-4xl mx-auto px-5 sm:px-6">
        <div class="section-reveal visible">
          <div class="flex items-center gap-4 mb-4">
            <span id="course-level" class="text-xs font-mono px-3 py-1 rounded" style="background: var(--tag-bg); color: var(--tag-text);">Level</span>
            <span id="course-duration" class="text-xs font-mono" style="color: var(--text-faint); opacity: 0.8;">Duration</span>
          </div>
          <h1 id="course-title" class="text-3xl sm:text-4xl lg:text-5xl font-bold tracking-tight mb-8" style="color: var(--text-primary);">
            Course Loading...
          </h1>
          <p id="course-desc" class="text-base sm:text-lg leading-relaxed mb-10" style="color: var(--text-faint);">
            Accessing course details from the registry.
          </p>
          <a id="btn-start" href="#" class="btn-contact inline-block text-sm px-10 py-4 rounded-lg transition-all duration-300 font-bold" style="background: var(--accent); color: var(--bg-primary); border: 1px solid var(--accent);">
            Start Course
          </a>
        </div>

        <div class="mt-20 section-reveal visible">
          <h2 class="text-2xl font-bold mb-8" style="color: var(--text-primary);">Modules & Curriculum</h2>
          <div id="module-list" class="flex flex-col gap-4">
            <!-- Modules injected here -->
          </div>
        </div>
      </div>
    </section>
  </div>

  <footer class="py-8 sm:py-12" style="border-top: 1px solid var(--footer-border);"></footer>

  <script src="../assets/js/script.js"></script>
  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      
      try {
        const response = await fetch('../courses.json');
        const data = await response.json();
        const course = data.courses.find(c => c.id === id);
        
        if (!course) {
          document.getElementById('course-title').textContent = "Course Not Found";
          return;
        }

        document.title = `${course.title} — Clinch Works`;
        document.getElementById('course-title').textContent = course.title;
        document.getElementById('course-desc').textContent = course.description;
        document.getElementById('course-level').textContent = course.level;
        document.getElementById('course-duration').textContent = course.duration;
        
        const btnStart = document.getElementById('btn-start');
        btnStart.href = `player.html?id=${course.id}`;

        // --- Progress Tracking UI Update ---
        const savedProgress = localStorage.getItem('course-' + course.id);
        if (savedProgress) {
          try {
            const pData = JSON.parse(savedProgress);
            let percent = Math.round((pData.currentModule / pData.totalModules) * 100);
            if (pData.completed) percent = 100;

            if (pData.completed) {
              btnStart.textContent = "Completed ✅";
              btnStart.style.background = "var(--success, #16a34a)";
              btnStart.style.borderColor = "var(--success, #16a34a)";
            } else if (pData.currentModule > 0 || percent > 0) {
              btnStart.textContent = "Resume Course";
            }

            if (percent > 0 || pData.currentModule > 0) {
              const infoBox = document.getElementById('course-level').parentElement;
              const progSpan = document.createElement('span');
              progSpan.className = "text-xs font-mono px-3 py-1 rounded";
              progSpan.style.background = "var(--bg-primary)";
              progSpan.style.border = "1px solid var(--accent, #c9a84c)";
              progSpan.style.color = "var(--accent, #c9a84c)";
              progSpan.textContent = `${percent}% Completed`;
              infoBox.appendChild(progSpan);
            }
          } catch(e) {}
        }

        const moduleContainer = document.getElementById('module-list');
        course.modules.forEach((mod, idx) => {
          const modEl = document.createElement('div');
          modEl.className = 'service-card p-5 rounded-xl border border-white/5 flex items-center justify-between';
          modEl.innerHTML = `
            <div class="flex items-center gap-4">
              <span class="text-sm font-mono opacity-50">${(idx + 1).toString().padStart(2, '0')}</span>
              <span class="font-medium" style="color: var(--text-primary);">${mod.title}</span>
            </div>
            <span class="text-xs font-mono opacity-40">Module</span>
          `;
          moduleContainer.appendChild(modEl);
        });

      } catch (err) {
        console.error('Data Load Error:', err);
      }
    })();
  </script>
</body>
</html>
