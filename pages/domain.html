  <div class="pt-24 min-h-screen">

      <div class="max-w-5xl mx-auto px-5 sm:px-6">
        <div class="section-reveal visible">

            Training Path

            Explore our curated list of technical courses designed to build real-world engineering and security skills.

  <script src="../assets/js/script.js"></script>
  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const category = params.get('category') || 'Programming';
      document.getElementById('category-title').textContent = category + ' Path';
      
      try {
        const response = await fetch('../courses.json');
        const data = await response.json();
        const courses = data.courses.filter(c => c.category === category);
        
        const container = document.getElementById('course-list');
        courses.forEach(course => {
          const card = document.createElement('div');
          card.className = 'service-card section-reveal visible rounded-2xl p-8 transition-transform hover:scale-[1.02] cursor-pointer';
          card.onclick = () => window.location.href = `course.html?id=${course.id}`;
          
          card.innerHTML = `
            <div class="flex justify-between items-start mb-4">
              <span class="text-xs font-mono px-2 py-1 rounded" style="background: var(--tag-bg); color: var(--tag-text);">${course.level}</span>
              <span class="text-xs font-mono" style="color: var(--text-faint);">${course.duration}</span>
            </div>
            <h3 class="font-bold text-2xl mb-4" style="color: var(--text-primary);">${course.title}</h3>
            <p class="text-sm leading-relaxed mb-6" style="color: var(--text-faint); line-clamp: 2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
              ${course.description}
            </p>
            <div class="flex items-center gap-2 text-sm font-medium" style="color: var(--accent);">
              Learn More <span>â†’</span>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (e) {
        console.error('Failed to load courses', e);
      }
    })();
  </script>
