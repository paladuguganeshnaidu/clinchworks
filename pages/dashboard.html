<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Clinch Works</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  

  <link rel="stylesheet" href="../assets/css/styles.css" />
  
  
  
  
  
  
  
  
  
  
  
<style>
  /* Force professional, smooth rendering for logos similar to premium SaaS products */
  img[src*='logo.png'], img[src*='favicon'] {
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges; /* fallback */
    image-rendering: auto;
    object-fit: contain;
    shape-rendering: geometricPrecision;
  }
</style>
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon1.png?v=2">
  <link rel="shortcut icon" href="../assets/favicon/favicon1.png?v=2">
  <link rel="apple-touch-icon" href="../assets/favicon/favicon1.png?v=2">
</head>

<body>

  <header id="header" class="fixed top-0 left-0 right-0 z-50"></header>

  
    <a href="dashboard.html">Dashboard</a>
    <a href="projects.html">Projects</a>
  </div>

  <div class="pt-24 min-h-screen">
    <section class="relative pb-16 pt-6 sm:pb-24 sm:pt-8 lg:pb-32 lg:pt-10">
      <div class="max-w-4xl mx-auto px-5 sm:px-6">
        <div class="section-reveal visible">
          <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold tracking-tight mb-4" style="color: var(--text-primary);">
            Student Dashboard
          </h1>
          <p class="text-base sm:text-lg leading-relaxed mb-10" style="color: var(--text-faint);">
            Track your progress and resume your active courses.
          </p>
        </div>

        <div class="mt-8 section-reveal visible">
          <div id="dashboard-list" class="flex flex-col gap-6">
            <!-- Course cards injected here -->
          </div>
        </div>
      </div>
    </section>
  </div>

  <footer class="py-8 sm:py-12" style="border-top: 1px solid var(--footer-border);"></footer>

  <script src="../assets/js/script.js"></script>
  <script>
    (async function() {
      try {
        const response = await fetch('../courses.json');
        const data = await response.json();
        
        const dashboardList = document.getElementById('dashboard-list');
        dashboardList.innerHTML = '';

        if (!data.courses || data.courses.length === 0) {
           dashboardList.innerHTML = '<p style="color: var(--text-faint);">No courses available.</p>';
           return;
        }

        data.courses.forEach(course => {
          let percent = 0;
          let statusText = "Not Started";
          let btnText = "Start";
          let btnColor = "var(--accent)";
          
          const savedProgress = localStorage.getItem('course-' + course.id);
          
          if (savedProgress) {
            try {
              const pData = JSON.parse(savedProgress);
              percent = Math.round((pData.currentModule / pData.totalModules) * 100);
              if (pData.completed) percent = 100;
              
              if (pData.completed) {
                statusText = "Completed";
                btnText = "View";
                btnColor = "var(--success, #16a34a)";
              } else if (pData.currentModule > 0 || percent > 0) {
                statusText = "In Progress";
                btnText = "Resume";
              }
            } catch(e) {}
          }

          const card = document.createElement('div');
          card.className = 'service-card p-6 sm:p-8 rounded-2xl flex flex-col sm:flex-row sm:items-center justify-between gap-6';

          const leftSide = `
            <div class="flex-1">
              <div class="flex items-center gap-3 mb-2">
                <span class="text-xs font-mono px-2 py-1 rounded" style="background: var(--tag-bg); color: var(--tag-text);">${course.category || 'TRAINING'}</span>
                <span class="text-xs font-mono" style="color: ${statusText === 'Completed' ? 'var(--success, #16a34a)' : (statusText === 'In Progress' ? 'var(--accent)' : 'var(--text-faint)')};">${statusText}</span>
              </div>
              <h2 class="text-xl sm:text-2xl font-bold mb-2" style="color: var(--text-primary);">${course.title}</h2>
              <div class="w-full h-1.5 rounded-full overflow-hidden mt-4" style="background: var(--border-color, rgba(255,255,255,0.05)); max-w-xs;">
                <div class="h-full transition-all duration-500 ease-out" style="width: ${percent}%; background: ${btnColor};"></div>
              </div>
              <span class="text-xs font-mono mt-2 inline-block" style="color: var(--text-faint);">${percent}% Completed</span>
            </div>
          `;

          const btnLink = statusText === 'Not Started' ? `course.html?id=${course.id}` : `player.html?id=${course.id}`;

          const rightSide = `
            <div class="flex-shrink-0">
              <a href="${btnLink}" class="inline-block text-sm px-8 py-3 rounded-xl font-bold transition-all border text-center min-w-[120px]" style="background: ${btnColor}; border-color: ${btnColor}; color: var(--bg-primary);">
                ${btnText}
              </a>
            </div>
          `;

          card.innerHTML = leftSide + rightSide;
          dashboardList.appendChild(card);
        });

      } catch (err) {
        console.error('Failed to load dashboard:', err);
      }
    })();
  </script>
</body>
</html>
