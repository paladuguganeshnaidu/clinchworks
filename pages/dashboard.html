  <script>
      (function () {

<body>

      <a href="../index.html" class="flex items-center gap-0 group z-10 lg:absolute lg:left-8">
        <div class="w-8 h-8 sm:w-9 sm:h-9 rounded-lg overflow-hidden flex-shrink-0 flex items-center justify-center transition-transform duration-300 group-hover:scale-110">
          <img src="../assets/images/logo.png" alt="Clinch Works Logo" class="w-[180%] h-[180%] max-w-none object-cover" />
        </div>
        <span class="font-semibold text-sm sm:text-[20px] tracking-wide transition-colors ml-1" style="color: #c9a84c;">Clinch Works</span>
      </a>

      <nav id="top-nav" class="top-nav glass-strong rounded-2xl px-3 py-1.5 sm:px-4 sm:py-2 hidden lg:block">
        <ul class="flex items-center gap-1 sm:gap-2">
          <li><a href="../index.html#about" class="top-nav-item block px-4 py-1.5 text-sm font-medium rounded-xl">About</a></li>
          <li><a href="services.html" class="top-nav-item block px-4 py-1.5 text-sm font-medium rounded-xl">Services</a></li>
          <li class="relative group">
            <a href="training.html" class="top-nav-item block px-4 py-1.5 text-sm font-medium rounded-xl">Training <span class="text-xs opacity-50 ml-1">▼</span></a>
            <div class="absolute left-0 top-full pt-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-[99]">
              <div class="glass-strong rounded-xl p-2 w-48 shadow-xl flex flex-col gap-1" style="background: var(--bg-primary); border: 1px solid var(--border-color);">
                <a href="domain.html?category=Programming" class="block px-4 py-2 text-sm rounded-lg transition-colors hover:text-[var(--accent)]" style="color: var(--text-secondary);">Programming</a>
                <a href="domain.html?category=Cyber%20Security" class="block px-4 py-2 text-sm rounded-lg transition-colors hover:text-[var(--accent)]" style="color: var(--text-secondary);">Cyber Security</a>
              </div>
            </div>
          </li>
          <li><a href="dashboard.html" class="top-nav-item block px-4 py-1.5 text-sm font-medium rounded-xl">Dashboard</a></li>
          <li><a href="projects.html" class="top-nav-item block px-4 py-1.5 text-sm font-medium rounded-xl">Projects</a></li>
        </ul>
      </nav>

      <div class="flex items-center gap-2 sm:gap-3 z-10 lg:absolute lg:right-8">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-moon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" /></svg>
          <svg class="icon-sun" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" /></svg>
        </button>
        <button id="hamburger" class="hamburger lg:hidden" aria-label="Open menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <div id="mobile-menu" class="mobile-menu lg:hidden">
    <a href="../index.html#about">About</a>
    <a href="services.html">Services</a>
    <a href="training.html">Training</a>
    <div class="flex flex-col w-full items-center gap-1 my-1">
      <a href="domain.html?category=Programming" class="text-sm py-2" style="color: var(--text-secondary);">— Programming</a>
      <a href="domain.html?category=Cyber%20Security" class="text-sm py-2" style="color: var(--text-secondary);">— Cyber Security</a>
    </div>
    <a href="dashboard.html">Dashboard</a>
    <a href="projects.html">Projects</a>
  </div>

  <div class="pt-24 min-h-screen">
    <section class="relative pb-16 pt-6 sm:pb-24 sm:pt-8 lg:pb-32 lg:pt-10">
      <div class="max-w-4xl mx-auto px-5 sm:px-6">
        <div class="section-reveal visible">
          <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold tracking-tight mb-4" style="color: var(--text-primary);">
            Student Dashboard
          </h1>
          <p class="text-base sm:text-lg leading-relaxed mb-10" style="color: var(--text-faint);">
            Track your progress and resume your active courses.
          </p>
        </div>

        <div class="mt-8 section-reveal visible">
          <div id="dashboard-list" class="flex flex-col gap-6">
            <!-- Course cards injected here -->
          </div>
        </div>
      </div>
    </section>
  </div>

  <footer class="py-8 sm:py-12" style="border-top: 1px solid var(--footer-border);">
    <div class="max-w-5xl mx-auto px-5 sm:px-6 flex flex-col sm:flex-row items-center justify-between gap-3 sm:gap-4">
      <span class="text-xs font-mono" style="color: var(--footer-text);">© 2026 Clinch Works</span>
    </div>
  </footer>

  <script src="../assets/js/script.js"></script>
  <script>
    (async function() {
      try {
        const response = await fetch('../courses.json');
        const data = await response.json();
        
        const dashboardList = document.getElementById('dashboard-list');
        dashboardList.innerHTML = '';

        if (!data.courses || data.courses.length === 0) {
           dashboardList.innerHTML = '<p style="color: var(--text-faint);">No courses available.</p>';
           return;
        }

        data.courses.forEach(course => {
          let percent = 0;
          let statusText = "Not Started";
          let btnText = "Start";
          let btnColor = "var(--accent)";
          
          const savedProgress = localStorage.getItem('course-' + course.id);
          
          if (savedProgress) {
            try {
              const pData = JSON.parse(savedProgress);
              percent = Math.round((pData.currentModule / pData.totalModules) * 100);
              if (pData.completed) percent = 100;
              
              if (pData.completed) {
                statusText = "Completed";
                btnText = "View";
                btnColor = "var(--success, #16a34a)";
              } else if (pData.currentModule > 0 || percent > 0) {
                statusText = "In Progress";
                btnText = "Resume";
              }
            } catch(e) {}
          }

          const card = document.createElement('div');
          card.className = 'service-card p-6 sm:p-8 rounded-2xl flex flex-col sm:flex-row sm:items-center justify-between gap-6';

          const leftSide = `
            <div class="flex-1">
              <div class="flex items-center gap-3 mb-2">
                <span class="text-xs font-mono px-2 py-1 rounded" style="background: var(--tag-bg); color: var(--tag-text);">${course.category || 'TRAINING'}</span>
                <span class="text-xs font-mono" style="color: ${statusText === 'Completed' ? 'var(--success, #16a34a)' : (statusText === 'In Progress' ? 'var(--accent)' : 'var(--text-faint)')};">${statusText}</span>
              </div>
              <h2 class="text-xl sm:text-2xl font-bold mb-2" style="color: var(--text-primary);">${course.title}</h2>
              <div class="w-full h-1.5 rounded-full overflow-hidden mt-4" style="background: var(--border-color, rgba(255,255,255,0.05)); max-w-xs;">
                <div class="h-full transition-all duration-500 ease-out" style="width: ${percent}%; background: ${btnColor};"></div>
              </div>
              <span class="text-xs font-mono mt-2 inline-block" style="color: var(--text-faint);">${percent}% Completed</span>
            </div>
          `;

          const btnLink = statusText === 'Not Started' ? `course.html?id=${course.id}` : `player.html?id=${course.id}`;

          const rightSide = `
            <div class="flex-shrink-0">
              <a href="${btnLink}" class="inline-block text-sm px-8 py-3 rounded-xl font-bold transition-all border text-center min-w-[120px]" style="background: ${btnColor}; border-color: ${btnColor}; color: var(--bg-primary);">
                ${btnText}
              </a>
            </div>
          `;

          card.innerHTML = leftSide + rightSide;
          dashboardList.appendChild(card);
        });

      } catch (err) {
        console.error('Failed to load dashboard:', err);
      }
    })();
  </script>
</body>
</html>
