<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | ClinchWorks</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                }

        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/logo-transparent.png?v=1">
    <link rel="shortcut icon" href="/assets/images/logo-transparent.png?v=1">
    <link rel="apple-touch-icon" href="/assets/images/logo-transparent.png?v=1">

</head>

<body class="w-full relative bg-[#0b1220]">
  <div id="tsparticles" class="fixed inset-0 z-[-1] opacity-60 pointer-events-auto" style="pointer-events: auto;"></div>


    <header id="header" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between relative">
            <a href="/" class="flex items-center gap-0 group z-10 w-1/4">
                <div
                    class="flex-shrink-0 flex items-center justify-center transition-transform duration-300 group-hover:scale-105">
                    <img src="/assets/images/logo.png?v=3" alt="Clinch Works Logo"
                        class="h-6 sm:h-8 w-auto object-contain rounded-[10px] border border-slate-200/50 shadow-sm"
                        style="overflow: hidden;" />
                </div>
                <span class="font-semibold text-sm sm:text-[20px] tracking-wide ml-2" style="color: #c9a84c;">Clinch
                    Works</span>
            </a>

            <nav id="top-nav"
                class="top-nav glass-strong rounded-full px-5 py-2.5 hidden lg:flex items-center justify-center absolute left-1/2 transform -translate-x-1/2 min-w-[500px] shadow-sm z-50"
                style="border: 1px solid rgba(247, 199, 99, 0.4);">
                <ul class="flex items-center gap-3 sm:gap-6 w-full justify-center m-0 p-0">
                    <li class="nav-item-wrapper"><a href="/"
                            class="top-nav-item block px-3 py-1 text-sm font-medium rounded-xl transition-colors"
                            data-section="about">About</a></li>
                    <li class="nav-item-wrapper"><a href="/services"
                            class="top-nav-item block px-3 py-1 text-sm font-medium rounded-xl transition-colors"
                            data-section="services">Services</a></li>
                    <li class="nav-item-wrapper"><a href="/domain"
                            class="top-nav-item block px-3 py-1 text-sm font-medium rounded-xl transition-colors"
                            data-section="training">Training</a></li>
                    <li class="nav-item-wrapper"><a href="/projects"
                            class="top-nav-item block px-3 py-1 text-sm font-medium rounded-xl transition-colors"
                            data-section="projects">Projects</a></li>
                </ul>
            </nav>

            <div class="flex items-center justify-end gap-3 z-10 w-1/4">
                <a href="/book-call"
                    class="hidden sm:flex items-center justify-center text-xs sm:text-sm font-bold shadow-lg transition-transform hover:scale-105"
                    style="background: #F7C763; color: #0b1220; border-radius: 999px; padding: 8px 20px;">Book a
                    Call</a>
            </div>
        </div>
    </header>

    <section class="relative min-h-screen flex items-center justify-center py-24 overflow-hidden">
        <div class="absolute inset-0 hero-bg"></div>
        <div class="hero-grid"></div>

        <div class="max-w-md w-full mx-auto px-5 sm:px-6 relative z-10">
            <div class="service-card rounded-[24px] p-8 sm:p-10 flex flex-col relative overflow-hidden group w-full shadow-2xl"
                style="background: var(--primary-gold);">

                <div
                    class="absolute inset-0 bg-gradient-to-tl from-[#c9a84c] to-[#F1AF2C] opacity-100 pointer-events-none z-0">
                </div>

                <div class="relative z-10 w-full flex flex-col items-center text-center">
                    <p class="text-xs font-bold tracking-widest uppercase mb-2" style="color: white;">ClinchWorks</p>
                    <h3 class="text-3xl sm:text-4xl font-black mb-8" style="color: var(--white-text);">REGISTER</h3>

                    <form id="register-form" class="w-full flex flex-col gap-3">
                        <div class="flex gap-3">
                            <input type="text" id="reg-firstname" placeholder="First Name"
                                class="w-1/2 px-4 py-3.5 rounded-xl bg-white text-black border-2 border-transparent focus:border-black outline-none transition-all text-sm font-medium shadow-inner"
                                style="background: white !important; color: black !important;" required />
                            <input type="text" id="reg-lastname" placeholder="Last Name"
                                class="w-1/2 px-4 py-3.5 rounded-xl bg-white text-black border-2 border-transparent focus:border-black outline-none transition-all text-sm font-medium shadow-inner"
                                style="background: white !important; color: black !important;" required />
                        </div>

                        <input type="tel" id="reg-phone" placeholder="Phone Number"
                            class="w-full px-4 py-3.5 rounded-xl bg-white text-black border-2 border-transparent focus:border-black outline-none transition-all text-sm font-medium shadow-inner"
                            style="background: white !important; color: black !important;" required />

                        <input type="email" id="reg-email" placeholder="Email Address"
                            class="w-full px-4 py-3.5 rounded-xl bg-white text-black border-2 border-transparent focus:border-black outline-none transition-all text-sm font-medium shadow-inner"
                            style="background: white !important; color: black !important;" required />

                        <input type="password" id="reg-password" placeholder="Password (Min 6 chars)"
                            class="w-full px-4 py-3.5 rounded-xl bg-white text-black border-2 border-transparent focus:border-black outline-none transition-all text-sm font-medium shadow-inner"
                            style="background: white !important; color: black !important;" required />

                        <input type="password" id="reg-confirm-password" placeholder="Confirm Password"
                            class="w-full px-4 py-3.5 rounded-xl bg-white text-black border-2 border-transparent focus:border-black outline-none transition-all text-sm font-medium shadow-inner"
                            style="background: white !important; color: black !important;" required />

                        <button type="submit" id="btn-register"
                            class="w-full mt-3 px-6 py-3.5 rounded-full text-sm font-black uppercase tracking-widest transition-all hover:scale-105 shadow-lg flex justify-center items-center bg-white text-black"
                            style="color: black !important; background: white !important; min-height: 48px;">
                            Create Account
                        </button>
                    </form>

                    <button id="google-login" type="button"
                        class="w-full mt-3 px-6 py-3.5 rounded-full text-sm font-black uppercase tracking-widest bg-white text-black hover:scale-105 transition-all shadow-lg flex items-center justify-center gap-3"
                        style="color: black !important; background: white !important;">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                fill="#4285F4" />
                            <path
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                fill="#34A853" />
                            <path
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                fill="#FBBC05" />
                            <path
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                fill="#EA4335" />
                            <path d="M1 1h22v22H1z" fill="none" />
                        </svg>
                        Continue with Google
                    </button>

                    <button id="github-login" type="button"
                        class="w-full mt-3 px-6 py-3.5 rounded-full text-sm font-black uppercase tracking-widest bg-white text-black hover:scale-105 transition-all shadow-lg flex items-center justify-center gap-3"
                        style="color: black !important; background: white !important;">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                            <path
                                d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
                        </svg>
                        Continue with GitHub
                    </button>

                    <div id="auth-msg" class="mt-4 text-sm font-bold text-center hidden min-h-[20px]"
                        style="color: #7f1d1d;"></div>

                    <p class="mt-6 text-sm font-semibold" style="color: var(--white-text);">
                        Already have an account?
                        <a href="/login" class="underline hover:opacity-80 transition-opacity"
                            style="color: var(--dark-text);">Log in</a>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- Essential Scripts -->
    <script type="module" src="/assets/js/auth.js?v=20260426-2"></script>


  <!-- tsParticles Library -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
  <script>
    if (typeof tsParticles !== 'undefined') {
      tsParticles.load("tsparticles", {
        fpsLimit: 60,
        interactivity: {
          events: {
            onHover: { enable: true, mode: "grab" },
            onClick: { enable: true, mode: "push" },
            resize: true
          },
          modes: {
            grab: { distance: 150, links: { opacity: 0.8, color: "#E6C76B" } },
            push: { quantity: 4 }
          }
        },
        particles: {
          color: { value: "#E6C76B" },
          links: {
            color: "#E6C76B",
            distance: 150,
            enable: true,
            opacity: 0.3,
            width: 1
          },
          move: {
            direction: "none",
            enable: true,
            outModes: { default: "bounce" },
            random: false,
            speed: 1.2,
            straight: false
          },
          number: {
            density: { enable: true, area: 800 },
            value: 60
          },
          opacity: { value: 0.5 },
          shape: { type: "circle" },
          size: { value: { min: 1, max: 3 } }
        },
        detectRetina: true
      });
    }
  </script>

</body>

</html>
