<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow" />
    <title>Register | ClinchWorks</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css?v=177659729621367" />


  <!-- Favicon Configuration -->
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/logo-transparent.png?v=1">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/logo-transparent.png?v=1">
  <link rel="shortcut icon" href="/assets/images/logo-transparent.png?v=1">
  <link rel="apple-touch-icon" href="/assets/images/logo-transparent.png?v=1">

</head>
<body class="overflow-x-hidden w-full relative bg-[#0b1220]">

    <header id="header" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between relative">
            <a href="/" class="flex items-center gap-0 group z-10 w-1/4">
                <div class="flex-shrink-0 flex items-center justify-center transition-transform duration-300 group-hover:scale-105">
                    <img src="/assets/images/logo.png?v=3" alt="Clinch Works Logo" class="h-6 sm:h-8 w-auto object-contain rounded-[10px] border border-slate-200/50 shadow-sm" style="overflow: hidden;" />
                </div>
                <span class="font-semibold text-sm sm:text-[20px] tracking-wide ml-2" style="color: #c9a84c;">Clinch Works</span>
            </a>

            <nav id="top-nav" class="top-nav glass-strong rounded-full px-5 py-2.5 hidden lg:flex items-center justify-center absolute left-1/2 transform -translate-x-1/2 min-w-[500px] shadow-sm z-50" style="border: 1px solid rgba(247, 199, 99, 0.4);">
                <ul class="flex items-center gap-3 sm:gap-6 w-full justify-center m-0 p-0">
                    <li class="nav-item-wrapper"><a href="/" class="top-nav-item block px-3 py-1 text-sm font-medium rounded-xl transition-colors" data-section="about">About</a></li>
                    <li class="nav-item-wrapper"><a href="/services" class="top-nav-item block px-3 py-1 text-sm font-medium rounded-xl transition-colors" data-section="services">Services</a></li>
                    <li class="nav-item-wrapper"><a href="/domain" class="top-nav-item block px-3 py-1 text-sm font-medium rounded-xl transition-colors" data-section="training">Training</a></li>
                    <li class="nav-item-wrapper"><a href="/projects" class="top-nav-item block px-3 py-1 text-sm font-medium rounded-xl transition-colors" data-section="projects">Projects</a></li>
                </ul>
            </nav>

            <div class="flex items-center justify-end gap-3 z-10 w-1/4">
                <a id="nav-auth-btn" href="/login" class="nav-user-trigger hidden sm:flex" aria-label="User menu">
                    <span class="nav-user-avatar-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21a8 8 0 0 0-16 0"></path>
                            <circle cx="12" cy="8" r="4"></circle>
                        </svg>
                    </span>
                    <span class="nav-user-avatar-text hidden" aria-hidden="true">U</span>
                </a>
                <a href="/book-call" class="hidden sm:flex items-center justify-center text-xs sm:text-sm font-bold shadow-lg transition-transform hover:scale-105" style="background: #F7C763; color: #0b1220; border-radius: 999px; padding: 8px 20px;">Book a Call</a>
            </div>
        </div>
    </header>

    <section class="relative min-h-screen flex items-center justify-center py-24 overflow-hidden">
        <div class="absolute inset-0 hero-bg"></div>
        <div class="hero-grid"></div>

        <div class="max-w-md w-full mx-auto px-5 sm:px-6 relative z-10 section-reveal opacity-0 translate-y-10">
            <div class="service-card rounded-[24px] p-8 sm:p-10 flex flex-col relative overflow-hidden group w-full shadow-2xl" style="background: var(--primary-gold);">
                
                <div class="absolute inset-0 bg-gradient-to-tl from-[#c9a84c] to-[#F1AF2C] opacity-100 pointer-events-none z-0"></div>

                <div class="relative z-10 w-full flex flex-col items-center text-center">
                    <p class="text-xs font-bold tracking-widest uppercase mb-2" style="color: var(--dark-text);">Join Us</p>
                    <h3 class="text-3xl sm:text-4xl font-black mb-8" style="color: var(--white-text);">Register</h3>

                    <form id="register-form" class="w-full flex flex-col gap-3">
                        <div class="flex gap-3">
                            <input type="text" id="reg-firstname" placeholder="First Name" class="w-1/2 px-4 py-3.5 rounded-xl bg-white text-black border-2 border-transparent focus:border-black outline-none transition-all text-sm font-medium shadow-inner" style="color: black !important;" required />
                            <input type="text" id="reg-lastname" placeholder="Last Name" class="w-1/2 px-4 py-3.5 rounded-xl bg-white text-black border-2 border-transparent focus:border-black outline-none transition-all text-sm font-medium shadow-inner" style="color: black !important;" required />
                        </div>
                        
                        <input type="tel" id="reg-phone" placeholder="Phone Number" class="w-full px-4 py-3.5 rounded-xl bg-white text-black border-2 border-transparent focus:border-black outline-none transition-all text-sm font-medium shadow-inner" style="color: black !important;" required />
                        
                        <input type="email" id="reg-email" placeholder="Email Address" class="w-full px-4 py-3.5 rounded-xl bg-white text-black border-2 border-transparent focus:border-black outline-none transition-all text-sm font-medium shadow-inner" style="color: black !important;" required />
                        
                        <input type="password" id="reg-password" placeholder="Password (Min 6 chars)" class="w-full px-4 py-3.5 rounded-xl bg-white text-black border-2 border-transparent focus:border-black outline-none transition-all text-sm font-medium shadow-inner" style="color: black !important;" required />
                        
                        <input type="password" id="reg-confirm-password" placeholder="Confirm Password" class="w-full px-4 py-3.5 rounded-xl bg-white text-black border-2 border-transparent focus:border-black outline-none transition-all text-sm font-medium shadow-inner" style="color: black !important;" required />
                        
                        <button type="submit" id="btn-register" class="w-full mt-3 px-6 py-3.5 rounded-full text-sm font-black uppercase tracking-widest transition-all hover:scale-105 shadow-lg flex justify-center items-center" style="background: var(--dark-text) !important; color: var(--primary-gold) !important; min-height: 48px;">
                            Create Account
                        </button>
                    </form>

                    <button id="google-login" 
class="w-full mt-3 px-6 py-3.5 rounded-full text-sm font-black uppercase tracking-widest bg-white text-black hover:scale-105 transition-all shadow-lg">
                        Continue with Google
                    </button>

                    <div id="auth-msg" class="mt-4 text-sm font-bold text-center hidden min-h-[20px]" style="color: #7f1d1d;"></div>
                    
                    <p class="mt-6 text-sm font-semibold" style="color: var(--white-text);">
                        Already have an account? 
                        <a href="/login" class="underline hover:opacity-80 transition-opacity" style="color: var(--dark-text);">Log in</a>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- Essential Scripts -->
    <script type="module" src="/assets/js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof gsap !== 'undefined') {
                gsap.to(".section-reveal", {
                    opacity: 1,
                    y: 0,
                    duration: 0.8,
                    ease: "power3.out",
                    delay: 0.1
                });
            }
        });
    </script>
</body>
</html>
